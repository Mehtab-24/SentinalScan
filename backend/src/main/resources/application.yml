server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/SentinelScan
    username: sentinel
    password: sentinel
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.sentinelscan: INFO
    org.flywaydb: INFO
    org.springframework.web: WARN