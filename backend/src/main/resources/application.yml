server:
  port: 8080
  address: 0.0.0.0
  tomcat:
    threads:
      max: 200
      min-spare: 10
    protocol: org.apache.coyote.http11.Http11NioProtocol
    accept-count: 100

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/SentinelScan
    username: sentinel
    password: sentinel
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.sentinelscan: INFO
    org.flywaydb: INFO
    org.springframework.web: WARN

# ── Presentation Mode Configuration ──────────────────────────────────────────
# Set scan.mode to 'mock' for demo mode (presentation-safe).
# Set scan.mode to 'real' to execute actual Semgrep and Trivy commands.
scan:
  mode: real  # 'mock' or 'real'
  mock:
    total-duration-ms: 12000  # Total simulated scan time in milliseconds
    phase-durations-ms: "2000,3000,4000,3000"  # Clone, Semgrep, Trivy, Scoring phases (milliseconds)
